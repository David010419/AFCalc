<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | AirConv Pro</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <nav class="top-nav">
            <div class="nav-container">
                <div class="nav-logo">
                    <i data-lucide="flame"></i>
                    <span>AirConv</span>
                </div>
                <div class="nav-links">
                    <a href="./index.html">Conversor</a>
                    <a href="./recetas.html">Recetas</a>
                    <a href="./blog.html">Blog</a>
                    <a href="./contacto.html" class="active">Contacto</a>
                    <a href="./sobrenosotros.html">Nosotros</a>
                </div>
            </div>
        </nav>

        <main class="main-container" style="margin-top: 3rem;">
            <div class="converter-card">
                <div class="card-header">
                    <h1>Hablemos</h1>
                    <p>¿Tienes dudas o sugerencias? Escríbenos.</p>
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 2rem;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="seo-text-card" style="text-align: center;">
                            <i data-lucide="mail" style="color: var(--accent-color); margin-bottom: 0.5rem;"></i>
                            <h4 style="color: var(--text-primary);">Email</h4>
                            <p>hola@airconv.pro</p>
                        </div>
                        <div class="seo-text-card" style="text-align: center;">
                            <i data-lucide="message-square" style="color: var(--accent-color); margin-bottom: 0.5rem;"></i>
                            <h4 style="color: var(--text-primary);">Soporte</h4>
                            <p>Respuesta en 24h</p>
                        </div>
                    </div>

                    <form onsubmit="event.preventDefault(); alert('Gracias por tu mensaje. Te contactaremos pronto.');" style="display: flex; flex-direction: column; gap: 1rem;">
                        <input type="text" placeholder="Tu nombre" style="padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: white; outline: none;" required>
                        <input type="email" placeholder="Tu email" style="padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: white; outline: none;" required>
                        <textarea placeholder="¿En qué podemos ayudarte?" style="padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: white; outline: none; min-height: 120px;" required></textarea>
                        <button type="submit" class="btn-primary" style="border: none;">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 AirConv Pro. Tu comunidad de freidoras de aire.</p>
        </footer>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
